{% extends "base.html" %}
{% block content %}
<h1>Добавить ребёнка для {{ parent.full_name }}</h1>
<form method="POST">
    <div class="row">
        <div class="col-md-6 mb-3">
            <label>Фамилия *</label>
            <input type="text" name="surname" class="form-control" value="{{ parent.surname }}" required>
        </div>
        <div class="col-md-6 mb-3">
            <label>Имя *</label>
            <input type="text" name="name" class="form-control" required>
        </div>
    </div>
    <div class="mb-3">
        <label>Отчество</label>
        <input type="text" name="patronymic" class="form-control">
    </div>
    <div class="row">
        <div class="col-md-6 mb-3">
            <label>Дата рождения</label>
            <input type="date" name="birth_date" class="form-control">
        </div>
        <div class="col-md-6 mb-3">
            <label>Дата смерти</label>
            <input type="date" name="death_date" class="form-control">
        </div>
    </div>
    <div class="row">
        <div class="col-md-6 mb-3">
            <label>Город</label>
            <input type="text" name="city" class="form-control">
        </div>
        <div class="col-md-6 mb-3">
            <label>Пол *</label>
            <select name="gender" class="form-select" required>
                <option value="M">Мужской</option>
                <option value="F">Женский</option>
            </select>
        </div>
    </div>
    {% if spouses %}
    <div class="mb-3">
        <label>Второй родитель (супруг/супруга)</label>
        <select name="second_parent_id" class="form-select">
            <option value="">Неизвестен</option>
            {% for sp in spouses %}
                <option value="{{ sp.id }}">{{ sp.full_name }}</option>
            {% endfor %}
        </select>
    </div>
    {% else %}
        <input type="hidden" name="second_parent_id" value="">
    {% endif %}
    <button class="btn btn-primary">Добавить</button>
    <a href="{{ url_for('person_detail', person_id=parent.id) }}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
