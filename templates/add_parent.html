{% extends "base.html" %}
{% block content %}
<h1>Добавить родителя для {{ person.full_name }}</h1>
<form method="POST">
    {% if not missing_gender %}
        <div class="alert alert-info">У этой персоны уже указаны оба родителя.</div>
        <a href="{{ url_for('person_detail', person_id=person.id) }}" class="btn btn-secondary">Назад</a>
    {% else %}
        <input type="hidden" name="gender" value="{{ missing_gender }}">
        <p>Будет добавлен <strong>{{ 'отец' if missing_gender == 'M' else 'мать' }}</strong>.</p>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Фамилия *</label>
                <input type="text" name="surname" class="form-control" value="{{ person.surname }}" required>
            </div>
            <div class="col-md-6 mb-3">
                <label>Имя *</label>
                <input type="text" name="name" class="form-control" required>
            </div>
        </div>
        <div class="mb-3">
            <label>Отчество</label>
            <input type="text" name="patronymic" class="form-control">
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Дата рождения</label>
                <input type="date" name="birth_date" class="form-control">
            </div>
            <div class="col-md-6 mb-3">
                <label>Дата смерти</label>
                <input type="date" name="death_date" class="form-control">
            </div>
        </div>
        <div class="mb-3">
            <label>Город</label>
            <input type="text" name="city" class="form-control">
        </div>
        <button class="btn btn-primary">Добавить родителя</button>
        <a href="{{ url_for('person_detail', person_id=person.id) }}" class="btn btn-secondary">Отмена</a>
    {% endif %}
</form>
{% endblock %}
